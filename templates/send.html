{% extends "layout.html" %}

{% block title %}
    Message
{% endblock %}

{% block main %}
    <h1 class="mb-3">Leave a Message</h1>
    <form action="/message" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="access" placeholder="Access code for reciever" type="text">
        </div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="password" placeholder="Access password" type="password">
        </div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="title" placeholder="Title" type="text">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-500px" name="note" placeholder="Write note" type="text">
        </div>
        <button class="btn btn-outline-primary" type="submit">Submit</button>
    </form>
{% endblock %}
